name: Publish to Dockerhub

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "sbt"
      - name: Setup sbt launcher
        uses: sbt/setup-sbt@v1
      - name: Package and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          sbt 'Docker / stage'
          STAGE_DIR=$(find target -name "Dockerfile" -not -path "*/streams/*" | head -1 | xargs dirname)
          docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          docker buildx create --name dockerbuilder --platform linux/amd64,linux/arm64 --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t mbari/beholder:${IMAGE_TAG} \
            -t mbari/beholder:latest \
            --push "$STAGE_DIR"
